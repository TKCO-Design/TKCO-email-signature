<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>이메일 서명 생성기</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;font-size:14px;background:#f4f4f6;color:#1a1a1a;min-height:100vh;display:flex;flex-direction:column}
header{background:#fff;border-bottom:1px solid #e0e0e6;padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:52px;flex-shrink:0}
header h1{font-size:15px;font-weight:600;letter-spacing:-0.3px}
.badge{font-size:11px;color:#888;background:#f0f0f4;padding:3px 8px;border-radius:20px}
.brand-tabs{background:#fff;border-bottom:1px solid #e0e0e6;display:flex;padding:0 28px;gap:4px;overflow-x:auto;flex-shrink:0}
.brand-tab{padding:12px 16px;font-size:12px;font-weight:600;color:#999;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;letter-spacing:0.3px;user-select:none;transition:color .15s,border-color .15s}
.brand-tab:hover{color:#333}
.brand-tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a}
.workspace{display:grid;grid-template-columns:360px 1fr;flex:1;min-height:0}
.panel-form{background:#fff;border-right:1px solid #e0e0e6;overflow-y:auto;padding:24px 22px 40px}
.brand-logo-fixed{display:flex;align-items:center;gap:12px;background:#f7f7f9;border:1px solid #e8e8ec;border-radius:8px;padding:12px 14px;margin-bottom:20px}
.brand-logo-fixed img{width:52px;height:52px;object-fit:contain;border-radius:4px;flex-shrink:0}
.brand-logo-info{flex:1}
.brand-name-label{font-size:12px;font-weight:700;color:#1a1a1a;letter-spacing:.5px}
.brand-url-label{font-size:11px;color:#888;margin-top:2px}
.fixed-badge{font-size:10px;color:#aaa;background:#eee;padding:2px 7px;border-radius:10px;font-weight:600}
.section-title{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#bbb;margin:18px 0 10px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.field-row.full{grid-template-columns:1fr}
.field label{display:block;font-size:11px;font-weight:600;color:#666;margin-bottom:5px}
.field input{width:100%;padding:8px 10px;border:1px solid #e0e0e6;border-radius:6px;font-size:13px;color:#1a1a1a;background:#fafafa;outline:none;transition:border-color .15s}
.field input:focus{border-color:#4f6ef7;background:#fff}
.fixed-field{background:#f7f7f9;border:1px solid #ebebee;border-radius:6px;padding:8px 10px;font-size:12px;color:#888;line-height:1.4;display:flex;align-items:flex-start;gap:8px;margin-bottom:8px}
.divider{height:1px;background:#f0f0f0;margin:8px 0}
.panel-preview{display:flex;flex-direction:column;background:#f4f4f6;overflow:hidden}
.preview-header{padding:18px 24px 0}
.preview-header h2{font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.6px}
.preview-email-mock{margin:14px 24px 0;background:#fff;border-radius:10px;border:1px solid #e0e0e6;overflow:hidden;flex-shrink:0}
.email-mock-bar{background:#f5f5f7;border-bottom:1px solid #e8e8ec;padding:9px 14px;font-size:11px;color:#999}
.email-mock-body{padding:18px 18px 14px}
.email-mock-text{font-size:13px;color:#444;line-height:1.7;margin-bottom:14px;font-family:Arial,sans-serif}
.email-mock-sep{border:none;border-top:1px solid #ebebee;margin:10px 0}
.code-panel{margin:14px 24px 0;background:#1e1e2e;border-radius:10px;border:1px solid #2d2d44;overflow:hidden;flex:1;display:flex;flex-direction:column;min-height:0}
.code-panel-header{padding:9px 13px;border-bottom:1px solid #2d2d44}
.code-panel-header span{font-size:10px;color:#5a6a7e;font-weight:600;letter-spacing:.8px}
.code-output{font-family:"SF Mono",Consolas,monospace;font-size:11px;line-height:1.6;color:#a8c5da;padding:13px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;flex:1;min-height:0}
.btn-row{display:flex;gap:10px;padding:12px 24px 16px;flex-shrink:0}
.btn{flex:1;padding:10px 14px;border-radius:7px;border:none;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .15s,transform .1s}
.btn:active{transform:scale(.97)}
.btn-secondary{background:#fff;color:#333;border:1px solid #ddd}
.btn-secondary:hover{background:#f7f7f9}
.btn-success{background:#19b97e;color:#fff}
.btn-success:hover{background:#14a06c}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:9999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<header>
  <h1>이메일 서명 생성기</h1>
  <span class="badge">Outlook 호환</span>
</header>
<div class="brand-tabs">
  <div class="brand-tab active" data-brand="UCLIX">UCLIX</div>
  <div class="brand-tab" data-brand="INTERCLIX">INTERCLIX</div>
  <div class="brand-tab" data-brand="AIFY">AIFY</div>
  <div class="brand-tab" data-brand="GROWFY">GROWFY</div>
  <div class="brand-tab" data-brand="TURTLE">TURTLE KNOWLEDGE</div>
</div>
<div class="workspace">
  <aside class="panel-form">
    <div class="brand-logo-fixed">
      <img id="brandLogoThumb" src="" alt="Brand Logo"/>
      <div class="brand-logo-info">
        <div class="brand-name-label" id="brandNameLabel">UCLIX</div>
        <div class="brand-url-label" id="brandUrlLabel"></div>
      </div>
      <span class="fixed-badge">고정</span>
    </div>
    <div class="section-title">이름 &amp; 직함</div>
    <div class="field-row">
      <div class="field"><label>이름 (한글)</label><input type="text" id="nameKo" value="신쟈니" placeholder="홍길동"/></div>
      <div class="field"><label>이름 (영문)</label><input type="text" id="nameEn" value="Johnny Shin" placeholder="Gildong Hong"/></div>
    </div>
    <div class="field-row">
      <div class="field"><label>직책 1</label><input type="text" id="title1" value="CMO" placeholder="디자인 리드"/></div>
      <div class="field"><label>직책 2 (선택)</label><input type="text" id="title2" value="" placeholder="추가 직책"/></div>
    </div>
    <div class="divider"></div>
    <div class="section-title">소속</div>
    <div class="field-row">
      <div class="field"><label>부서 1</label><input type="text" id="dept1" value="Visual Communications" placeholder="브랜드 디자인팀"/></div>
      <div class="field"><label>부서 2 (선택)</label><input type="text" id="dept2" value="" placeholder="추가 부서"/></div>
    </div>
    <div class="divider"></div>
    <div class="section-title">연락처</div>
    <div class="field-row">
      <div class="field"><label>전화 1</label><input type="text" id="phone1" value="010-2925-2974" placeholder="010-0000-0000"/></div>
      <div class="field"><label>전화 2 (선택)</label><input type="text" id="phone2" value="" placeholder="대표번호"/></div>
    </div>
    <div class="divider"></div>
    <div class="section-title">고정 정보</div>
    <div class="fixed-field"><span>📍</span><span id="fixedAddress"></span></div>
    <div class="fixed-field"><span>🔗</span><span id="fixedWebsite"></span></div>
  </aside>
  <main class="panel-preview">
    <div class="preview-header"><h2>미리보기</h2></div>
    <div class="preview-email-mock">
      <div class="email-mock-bar">받는사람: team@company.com &middot; 제목: [프로젝트명] 관련 공유 드립니다</div>
      <div class="email-mock-body">
        <div class="email-mock-text">안녕하세요,<br>말씀드린 자료 첨부드립니다. 검토 후 피드백 주시면 감사하겠습니다.</div>
        <hr class="email-mock-sep"/>
        <div id="sig-preview"></div>
      </div>
    </div>
    <div class="code-panel">
      <div class="code-panel-header"><span>HTML CODE</span></div>
      <div class="code-output" id="htmlOutput"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="copyHtmlCode()">&lt;/&gt; HTML 코드 복사</button>
      <button class="btn btn-success" onclick="copyRendered()">&#10003; 서명 복사 (아웃룩에 바로 붙여넣기)</button>
    </div>
  </main>
</div>
<div class="toast" id="toast"></div>

var BRANDS = {
  UCLIX:     {displayName:'UCLIX',           websiteUrl:'https://www.uclix.com/',           websiteText:'UCLIX.COM',           address:'5F, 74 Gwacheon-daero 7-Gil, Gwacheon, Gyeonggi, 13840'},
  INTERCLIX: {displayName:'INTERCLIX',       websiteUrl:'http://www.interclix.com/',        websiteText:'INTERCLIX.COM',       address:'5F, 74 Gwacheon-daero 7-Gil, Gwacheon, Gyeonggi, 13840'},
  AIFY:      {displayName:'AIFY',            websiteUrl:'https://www.aify.ai/',             websiteText:'AIFY.AI',             address:'5F, 74 Gwacheon-daero 7-Gil, Gwacheon, Gyeonggi, 13840'},
  GROWFY:    {displayName:'GROWFY',          websiteUrl:'https://www.growfy.co.kr/',        websiteText:'GROWFY.CO.KR',        address:'5F, 74 Gwacheon-daero 7-Gil, Gwacheon, Gyeonggi, 13840'},
  TURTLE:    {displayName:'TURTLE KNOWLEDGE',websiteUrl:'https://www.turtleknowledge.com/',websiteText:'TURTLEKNOWLEDGE.COM', address:'5F, 74 Gwacheon-daero 7-Gil, Gwacheon, Gyeonggi, 13840'}
};

var currentBrand = 'UCLIX';

document.querySelectorAll('.brand-tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.brand-tab').forEach(function(t){ t.classList.remove('active'); });
    tab.classList.add('active');
    currentBrand = tab.dataset.brand;
    updateBrandUI();
    updateSignature();
  });
});

function updateBrandUI() {
  var b = BRANDS[currentBrand];
  document.getElementById('brandLogoThumb').src = LOGOS[currentBrand];
  document.getElementById('brandNameLabel').textContent = b.displayName;
  document.getElementById('brandUrlLabel').textContent = b.websiteUrl.replace(/https?:\/\//, '').replace(/\/$/, '');
  document.getElementById('fixedAddress').textContent = b.address;
  document.getElementById('fixedWebsite').textContent = b.websiteText;
}

document.querySelectorAll('input').forEach(function(i){ i.addEventListener('input', updateSignature); });

function v(id){ return document.getElementById(id).value.trim(); }

function esc(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function sepLine(a, b){
  var parts = [a, b].filter(Boolean);
  if(!parts.length) return '';
  if(parts.length === 1) return esc(parts[0]);
  return esc(parts[0]) + ' <span style="color:#ccc;">|</span> ' + esc(parts[1]);
}

function buildSignatureHTML(){
  var b = BRANDS[currentBrand];
  var nameKo = v('nameKo'), nameEn = v('nameEn');
  var title1 = v('title1'), title2 = v('title2');
  var dept1 = v('dept1'), dept2 = v('dept2');
  var phone1 = v('phone1'), phone2 = v('phone2');
  var logo = LOGOS[currentBrand];

  var fullName = [nameKo, nameEn].filter(Boolean).join(' ');
  var titleStr = [title1, title2].filter(Boolean).join(', ');

  var nameLine = titleStr
    ? '<strong style="color:#1a1a1a;">' + esc(fullName) + '</strong> <span style="color:#ccc;">|</span> ' + esc(titleStr)
    : '<strong style="color:#1a1a1a;">' + esc(fullName) + '</strong>';

  var rows = '';
  if(fullName)
    rows += '<tr><td style="padding:0 0 4px 0;font-size:10pt;font-family:Arial,sans-serif;color:#1a1a1a;white-space:nowrap;">' + nameLine + '</td></tr>';
  if(dept1||dept2)
    rows += '<tr><td style="padding:0 0 2px 0;font-size:10pt;font-family:Arial,sans-serif;color:#555;">' + sepLine(dept1,dept2) + '</td></tr>';
  if(phone1||phone2)
    rows += '<tr><td style="padding:0 0 2px 0;font-size:10pt;font-family:Arial,sans-serif;color:#555;">' + sepLine(phone1,phone2) + '</td></tr>';
  rows += '<tr><td style="padding:0 0 2px 0;font-size:10pt;font-family:Arial,sans-serif;color:#555;">' + esc(b.address) + '</td></tr>';
  rows += '<tr><td style="padding:0;font-size:10pt;font-family:Arial,sans-serif;"><a href="' + esc(b.websiteUrl) + '" style="color:#1a1a1a;text-decoration:underline;font-weight:bold;">' + esc(b.websiteText) + '</a></td></tr>';

  return '<table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">'
    + '<tr>'
    + '<td style="vertical-align:top;padding-right:14px;">'
    + '<a href="' + esc(b.websiteUrl) + '" style="display:block;border:none;text-decoration:none;">'
    + '<img src="' + logo + '" width="77" height="77" alt="' + esc(b.displayName) + '" style="display:block;border:none;"/>'
    + '</a></td>'
    + '<td style="vertical-align:top;">'
    + '<table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">'
    + rows
    + '</table></td></tr></table>';
}

function updateSignature(){
  var html = buildSignatureHTML();
  document.getElementById('sig-preview').innerHTML = html;
  document.getElementById('htmlOutput').textContent = html;
}

function copyHtmlCode(){
  navigator.clipboard.writeText(buildSignatureHTML()).then(function(){ showToast('HTML 코드가 복사되었습니다'); });
}

function copyRendered(){
  var container = document.getElementById('sig-preview');
  var range = document.createRange();
  range.selectNodeContents(container);
  var sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  var htmlBlob = new Blob([container.innerHTML], {type:'text/html'});
  var textBlob = new Blob([container.innerText], {type:'text/plain'});
  if(navigator.clipboard && navigator.clipboard.write){
    navigator.clipboard.write([new ClipboardItem({'text/html':htmlBlob,'text/plain':textBlob})])
      .then(function(){ sel.removeAllRanges(); showToast('서명 복사 완료 — 아웃룩 서명 편집창에 Ctrl+V 로 붙여넣으세요'); })
      .catch(function(){ document.execCommand('copy'); sel.removeAllRanges(); showToast('서명이 복사되었습니다'); });
  } else {
    document.execCommand('copy');
    sel.removeAllRanges();
    showToast('서명이 복사되었습니다');
  }
}

function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 3000);
}

updateBrandUI();
updateSignature();
</script>
